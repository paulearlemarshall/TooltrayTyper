<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooltrayTyper Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12 16L16 12L12 8" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M8 12H16" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#8B5CF6" />
                                <stop offset="1" stop-color="#3B82F6" />
                            </linearGradient>
                            <linearGradient id="paint1_linear" x1="12" y1="8" x2="16" y2="16"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#8B5CF6" />
                                <stop offset="1" stop-color="#3B82F6" />
                            </linearGradient>
                            <linearGradient id="paint2_linear" x1="8" y1="12" x2="16" y2="12"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#8B5CF6" />
                                <stop offset="1" stop-color="#3B82F6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>TooltrayTyper</h1>
            </div>
            <p class="subtitle">Magic LLM spelling & formatting via hotkey</p>
        </header>

        <main>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="provider">LLM Provider</label>
                    <div class="select-wrapper">
                        <select id="provider" name="provider">
                            <option value="openai">OpenAI (ChatGPT)</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="anthropic">Anthropic (Claude)</option>
                        </select>
                        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.67"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="apiKey">API Key <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." required>
                        <button type="button" id="toggleVisibility" class="icon-button" aria-label="Toggle visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <p class="help-text">Your API key is stored locally and securely.</p>
                </div>

                <div class="form-group">
                    <label for="model">Model</label>
                    <div class="model-row">
                        <div class="select-wrapper flex-grow">
                            <select id="model" name="model">
                                <option value="">Loading models...</option>
                            </select>
                            <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.67"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <button type="button" id="refreshModelsBtn" class="icon-button outline-btn"
                            aria-label="Refresh Models" title="Refresh Models">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="refresh-icon">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group prompts-group">
                    <label>Configurable Prompts</label>
                    <p class="help-text mb-3">Select the active prompt to use when pressing the hotkey.</p>

                    <div class="prompt-item">
                        <label class="radio-label">
                            <input type="radio" name="activePrompt" value="0" checked>
                            <span class="custom-radio"></span>
                        </label>
                        <textarea id="prompt0" rows="2" placeholder="tidy this text"></textarea>
                    </div>

                    <div class="prompt-item">
                        <label class="radio-label">
                            <input type="radio" name="activePrompt" value="1">
                            <span class="custom-radio"></span>
                        </label>
                        <textarea id="prompt1" rows="2" placeholder="fix spelling and grammar"></textarea>
                    </div>

                    <div class="prompt-item">
                        <label class="radio-label">
                            <input type="radio" name="activePrompt" value="2">
                            <span class="custom-radio"></span>
                        </label>
                        <textarea id="prompt2" rows="2" placeholder="summarize this text"></textarea>
                    </div>

                    <div class="prompt-item">
                        <label class="radio-label">
                            <input type="radio" name="activePrompt" value="3">
                            <span class="custom-radio"></span>
                        </label>
                        <textarea id="prompt3" rows="2" placeholder="translate to english"></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label for="hotkey">Global Hotkey Activation</label>
                    <input type="text" id="hotkey" name="hotkey" placeholder="CommandOrControl+Alt+L"
                        value="CommandOrControl+Alt+L">
                    <p class="help-text">Default: Ctrl+Alt+L</p>
                </div>

            </form>
        </main>

        <footer>
            <button type="button" id="saveBtn" class="primary-button">
                <span>Save Settings</span>
                <svg class="spinner hidden" width="20" height="20" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <style>
                        .spinner_P7sC {
                            transform-origin: center;
                            animation: spinner_svv2 .75s infinite linear
                        }

                        @keyframes spinner_svv2 {
                            100% {
                                transform: rotate(360deg)
                            }
                        }
                    </style>
                    <path
                        d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12,1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z"
                        class="spinner_P7sC" />
                </svg>
                <svg class="check hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </button>
        </footer>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
