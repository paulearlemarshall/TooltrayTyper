name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Electron install
        run: npx electron --version

      - name: Verify project metadata
        run: node -e "const p=require('./package.json'); if(!p.name||!p.version) process.exit(1); console.log(p.name, p.version);"
